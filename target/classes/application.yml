spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spms}
    username: ${DB_USERNAME:spms_user}
    password: ${DB_PASSWORD:spms_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    # This app's default/pre-multi-tenancy schema *is* RIT's actual data (soon to be renamed
    # to org_rit per the multi-tenancy plan), so it needs both the generic tenant baseline and
    # RIT's real seed content. A brand-new org provisioned later only ever gets db/migration --
    # see OrganizationProvisioningService/TenantMigrationRunner, which deliberately omit
    # db/migration-rit-seed unless an org's own extra_content_locations says otherwise. Other
    # deployments of this same codebase (e.g. the public trial environment) override this to
    # just "classpath:db/migration" so their default schema doesn't carry RIT-specific content.
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration,classpath:db/migration-rit-seed}

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-please-32chars}
    expiration-ms: 86400000
  # Super Admin platform layer -- see PlatformJwtTokenProvider's javadoc for why this has its
  # own, separate secret from app.jwt above rather than reusing it.
  platform:
    jwt:
      secret: ${PLATFORM_JWT_SECRET:another-256-bit-secret-key-change-in-production-please-32c}
      expiration-ms: 86400000
    # First-run only: seeds one Super Admin if platform_admin is empty. Change the password
    # immediately after first login -- these are dev-friendly defaults, not meant for prod.
    bootstrap-admin-email: ${BOOTSTRAP_ADMIN_EMAIL:superadmin@strtalign.com}
    bootstrap-admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:changeme}
  # Local filesystem path new organizations' uploaded logos are stored under (served back out
  # via /uploads/** -- see UploadsWebMvcConfig). Move to object storage later without changing
  # the Organization.logoPath shape, just what it resolves to.
  uploads:
    dir: ${UPLOADS_DIR:./uploads}
  # SWOT collaborative workflow: ranked-choice voting weights and word-count
  # gates for the SWOT-to-draft-strategy module. Tune here rather than in code.
  swot:
    min-words-per-quadrant: 3
    max-words-per-quadrant: 15
    vote-rank-count: 3
    vote-rank-weights: [3, 2, 1]
    top-words-per-quadrant-for-ai: 5
    synonym-suggestion-count: 6
  # AI provider for SWOT area/goal generation (SwotAreaGoalGenerator). Synonym
  # suggestions are separate — always local WordNet, no AI/network involved.
  # "ollama" (default): free, self-hosted — run `ollama pull llama3.1` and
  #   `ollama serve` first; see app.ai.ollama below.
  # "claude": requires ANTHROPIC_API_KEY in the process environment.
  ai:
    provider: ollama
    # AiEngineHealthCheckService: periodic probe of whichever AiEngineHealthChecker implementation
    # is active for the provider above, notifying every ADMIN when it stops responding (and again
    # when it recovers) -- see AiEngineHealthChecker's Javadoc for why only Ollama has a checker
    # today. Provider-agnostic; each provider's own checker owns its own connection timeout
    # separately (e.g. ollama.health-check-timeout-seconds below). Set enabled: false to turn the
    # whole check off regardless of provider.
    health-check:
      enabled: true
      interval-ms: 300000 # 5 minutes
    ollama:
      base-url: http://localhost:11434
      model: llama3.1
      # Context window sent with every Ollama request (options.num_ctx) -- Ollama otherwise falls
      # back to a small model default (often 2048-4096 tokens) and silently truncates anything
      # beyond it. Raise this further if a prompt-heavy generator (e.g. Teaching Evaluations
      # drafting from a large PDF) still seems to be missing content from later in its input.
      num-ctx: 16384
      # HTTP timeouts for the call to Ollama. Generation already runs fully in the background (the
      # employee can close the page and come back later), so the read timeout is intentionally very
      # generous -- raise it further (e.g. to 720 for 12 hours) if a real run still times out before
      # a slow local/CPU-only model finishes.
      connect-timeout-seconds: 10
      read-timeout-minutes: 360
      # Separate, much shorter timeout used only by OllamaEngineHealthChecker's periodic probe
      # (GET /api/tags, not a real generation call) -- a health check must fail fast, not wait
      # hours like a real generation call is allowed to.
      health-check-timeout-seconds: 5

server:
  port: 8085
  address: ${SERVER_ADDRESS:0.0.0.0}

# Only "health" is exposed -- RIT's platform-join readiness probe (and our own Docker
# HEALTHCHECK) need it reachable without auth (see SecurityConfig's permitAll on
# /actuator/health), so keep the exposed surface to just that rather than the full actuator
# default set (env, beans, etc. would otherwise be reachable at the same permitAll rule).
management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    # Spring Boot auto-configures an LDAP health indicator purely because our LDAP-auth feature
    # registers an LdapTemplate bean -- it ignores our own ldap.enabled switch and tries a real
    # connection regardless, which reports the whole app DOWN whenever LDAP isn't actually in
    # use (the default). Tie it to the same flag so health only reflects LDAP when LDAP is
    # actually the active auth mode.
    ldap:
      enabled: ${ldap.enabled:false}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ─── LDAP Authentication ─────────────────────────────────────────────────────
# Set ldap.enabled=true at deployment to switch from local BCrypt to LDAP auth.
# No code changes required — only this file (or an env-specific override) needs
# to be updated.
ldap:
  enabled: false

  # LDAP server URL (required when enabled=true)
  # url: ldap://ldap.rit.edu:389
  # url: ldaps://ldap.rit.edu:636      # TLS variant

  # Base DN for all operations (optional — narrows all searches)
  # base: dc=rit,dc=edu

  # ── Pattern-based auth (OpenLDAP / standard LDAP) ──────────────────────────
  # Constructs the user DN directly: uid=user@rit.edu,ou=people,dc=rit,dc=edu
  # user-dn-pattern: uid={0},ou=people

  # ── Search-based auth (Active Directory / complex directory) ───────────────
  # Searches for the user's DN using a filter, then binds.
  # Leave user-search-filter blank to fall back to user-dn-pattern.
  # user-search-filter: (sAMAccountName={0})   # AD username
  # user-search-filter: (userPrincipalName={0}) # AD UPN / email
  # user-search-base: ou=accounts               # relative to base, or blank

  # ── Bind account (required for search-based auth; omit for anonymous bind) ─
  # bind-dn: cn=svc-spms,ou=service-accounts,dc=rit,dc=edu
  # bind-password: changeme

# ─── Gateway SSO (e.g. RIT Dubai's Academic Dashboard) ────────────────────────
# Set gateway-sso.enabled=true to accept a third-party gateway's RS256 JWT (via
# cookie or Bearer) as an alternative session, alongside this app's own JWT and
# the LDAP toggle above -- see GatewaySsoProperties and the module integration
# contract this implements. Every value below MUST be confirmed with the
# gateway's maintainers before enabling in a real deployment; the values shown
# are RIT Dubai's Academic Dashboard docs' own stated examples, not guarantees.
gateway-sso:
  enabled: false

  # jwks-uri: https://ie.ritdubai.ae/.well-known/jwks.json

  # Confirm the production value with maintainers -- their own docs show this
  # only as a local-dev default, not a guaranteed production value.
  # issuer: academicspring-auth

  # introspect-uri: https://ie.ritdubai.ae/auth/introspect

  # cookie-name: rit_session   # default already matches this; only override if told otherwise

  # 0 (default) calls introspect-uri on every protected request, matching the
  # gateway's contract default. Only raise this if the gateway's maintainers
  # have explicitly approved a bounded cache interval for this deployment.
  # revocation-cache-seconds: 0

  # RIT Dubai's Gateway issues its `email` claim under either "rit.edu" or
  # "g.rit.edu" for the same person, but every StratAlign AppUser row is always
  # stored under exactly one -- confirmed rit.edu. Leave blank (default) to use
  # the JWT's raw `email` claim as-is instead.
  # canonical-email-domain: rit.edu

# ─── Claude API (Anthropic) ──────────────────────────────────────────────────
# Only needed if app.ai.provider=claude above. Requires ANTHROPIC_API_KEY to be
# set in the process environment at deploy time (never commit a key here or to
# git). Not used at all under the default "ollama" provider.
