spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/spms
    username: spms_user
    password: spms_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: your-256-bit-secret-key-change-in-production-please-32chars
    expiration-ms: 86400000
  # SWOT collaborative workflow: ranked-choice voting weights and word-count
  # gates for the SWOT-to-draft-strategy module. Tune here rather than in code.
  swot:
    min-words-per-quadrant: 3
    max-words-per-quadrant: 15
    vote-rank-count: 3
    vote-rank-weights: [3, 2, 1]
    top-words-per-quadrant-for-ai: 5
    synonym-suggestion-count: 6
  # AI provider for SWOT area/goal generation (SwotAreaGoalGenerator). Synonym
  # suggestions are separate — always local WordNet, no AI/network involved.
  # "ollama" (default): free, self-hosted — run `ollama pull llama3.1` and
  #   `ollama serve` first; see app.ai.ollama below.
  # "claude": requires ANTHROPIC_API_KEY in the process environment.
  ai:
    provider: ollama
    ollama:
      base-url: http://localhost:11434
      model: llama3.1
      # Context window sent with every Ollama request (options.num_ctx) -- Ollama otherwise falls
      # back to a small model default (often 2048-4096 tokens) and silently truncates anything
      # beyond it. Raise this further if a prompt-heavy generator (e.g. Teaching Evaluations
      # drafting from a large PDF) still seems to be missing content from later in its input.
      num-ctx: 16384
      # HTTP timeouts for the call to Ollama. Generation already runs fully in the background (the
      # employee can close the page and come back later), so the read timeout is intentionally very
      # generous -- raise it further (e.g. to 720 for 12 hours) if a real run still times out before
      # a slow local/CPU-only model finishes.
      connect-timeout-seconds: 10
      read-timeout-minutes: 360

server:
  port: 8085

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ─── LDAP Authentication ─────────────────────────────────────────────────────
# Set ldap.enabled=true at deployment to switch from local BCrypt to LDAP auth.
# No code changes required — only this file (or an env-specific override) needs
# to be updated.
ldap:
  enabled: false

  # LDAP server URL (required when enabled=true)
  # url: ldap://ldap.rit.edu:389
  # url: ldaps://ldap.rit.edu:636      # TLS variant

  # Base DN for all operations (optional — narrows all searches)
  # base: dc=rit,dc=edu

  # ── Pattern-based auth (OpenLDAP / standard LDAP) ──────────────────────────
  # Constructs the user DN directly: uid=user@rit.edu,ou=people,dc=rit,dc=edu
  # user-dn-pattern: uid={0},ou=people

  # ── Search-based auth (Active Directory / complex directory) ───────────────
  # Searches for the user's DN using a filter, then binds.
  # Leave user-search-filter blank to fall back to user-dn-pattern.
  # user-search-filter: (sAMAccountName={0})   # AD username
  # user-search-filter: (userPrincipalName={0}) # AD UPN / email
  # user-search-base: ou=accounts               # relative to base, or blank

  # ── Bind account (required for search-based auth; omit for anonymous bind) ─
  # bind-dn: cn=svc-spms,ou=service-accounts,dc=rit,dc=edu
  # bind-password: changeme

# ─── Claude API (Anthropic) ──────────────────────────────────────────────────
# Only needed if app.ai.provider=claude above. Requires ANTHROPIC_API_KEY to be
# set in the process environment at deploy time (never commit a key here or to
# git). Not used at all under the default "ollama" provider.
